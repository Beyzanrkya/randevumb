openapi: 3.0.3
info:
  title: MBrandev Appointment API
  description: >
    Bu API, çok kategorili randevu sisteminin yönetilmesi için
    tasarlanmış bir RESTful servistir. Temel CRUD (Create, Read, Update, Delete) işlemlerini
    destekler. Müşteriler işletmelere randevu alabilir, hizmetleri görüntüleyebilir
    ve yorum bırakabilir. API, JWT tabanlı kimlik doğrulama ile korunmaktadır.
  version: 1.0.0
  contact:
    name: MBrandev API Destek Ekibi
    email: api-support@mbrandev.com
    url: https://mbrandev.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.vercel.com
    description: Üretim sunucusu (Production)
  - url: https://staging-api.vercel.com
    description: Test sunucusu (Staging)
  - url: https://localhost:3000
    description: Yerel geliştirme sunucusu (Development)

tags:
  - name: customers
    description: Müşteri hesap yönetimi işlemleri
  - name: businesses
    description: İşletme hesap ve işletme yönetimi işlemleri
  - name: appointments
    description: Randevu oluşturma ve yönetim işlemleri
  - name: services
    description: İşletmelerin sunduğu hizmet yönetimi işlemleri
  - name: comments
    description: Müşteri yorum işlemleri
  - name: categories
    description: İşletme kategorileri listeleme işlemleri
  - name: auth
    description: Kimlik doğrulama işlemleri

security:
  - BearerAuth: []

paths:
  /customers/register:
    post:
      tags:
        - auth
      summary: Müşteri kayıt
      description: Sisteme yeni bir kullanıcı kaydeder
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegister"
            examples:
              example1:
                summary: Örnek kullanıcı kaydı
                value:
                  email: kullanici@example.com
                  password: Guvenli123!
                  firstName: Ahmet
                  lastName: Yılmaz
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerRegister"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email adresi zaten kullanımda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /customers/login:
    post:
      tags:
        - auth
      summary: Müşteri giriş
      description: Email ve şifre ile giriş yapar, JWT token döner
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Başarılı giriş
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /customers/{customerId}:
    parameters:
      - name: customerId
        in: path
        required: true
        description: Müşterinin benzersiz kimlik numarası
        schema:
          type: integer
        example: 1

    put:
      tags:
        - customers
      summary: Profil güncelle
      description: Kullanıcı profilini günceller
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Kullanıcı başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu işlem için yetkiniz bulunmuyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /appointments:
    post:
      tags:
        - appointments
      summary: Randevu oluştur
      description: Yeni randevu oluşturur
      operationId: appointmentsOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreate"
      responses:
        "201":
          description: Randevu oluşturuldu
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      tags:
        - appointments
      summary: Randevu listele
      description: Kullanıcının randevularını listeler
      operationId: listAppointments
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Sayfa numarası (varsayılan 1)
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: Sayfa başına sonuç sayısı (varsayılan 20, maksimum 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        "200":
          description: Randevu listesi başarıyla getirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentsList"

  /appointments/{appointmentId}:
    parameters:
      - name: appointmentId
        in: path
        required: true
        description: Randevunun benzersiz kimlik numarası
        schema:
          type: integer
        example: 42

    put:
      tags:
        - appointments
      summary: Randevu güncelle
      description: Kullanıcı randevularını günceller
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Güncellendi
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu işlem için yetkiniz bulunmuyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Randevu bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - appointments
      summary: Randevu sil
      description: Randevuyu sistemden siler
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Randevu başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu işlem için yetkiniz bulunmuyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Randevu bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /comments:
    post:
      tags:
        - comments
      summary: Yorum ekle
      description: İşletmeye yorum ekler
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Yorum başarıyla oluşturuldu
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /comments/{commentId}:
    parameters:
      - name: commentId
        in: path
        required: true
        description: Yorumun benzersiz kimlik numarası
        schema:
          type: integer
        example: 7

    put:
      tags:
        - comments
      summary: Yorum güncelle
      description: İşletmeden yorum günceller
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Yorum başarıyla güncellendi
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu işlem için yetkiniz bulunmuyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Yorum bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - comments
      summary: Yorum sil
      description: İşletmeden yorum siler
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Yorum başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu işlem için yetkiniz bulunmuyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Yorum bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /businesses/register:
    post:
      tags:
        - auth
      summary: İşletme kayıt
      description: Sisteme yeni bir işletme kaydeder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessRegister"
            examples:
              example1:
                summary: Örnek işletme kaydı
                value:
                  email: isletme@example.com
                  password: Guvenli123!
                  name: "ABC Kuaför"
      responses:
        "201":
          description: İşletme başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessRegister"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email zaten kullanımda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /businesses/login:
    post:
      tags:
        - auth
      summary: İşletme giriş
      description: Email ve şifre ile giriş yapar, JWT token döner
      operationId: loginBusiness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /businesses:
    post:
      tags:
        - businesses
      summary: İşletme oluştur
      description: Yeni işletme oluştur
      security:
        - BearerAuth: []
      responses:
        "201":
          description: İşletme başarıyla oluşturuldu
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /businesses/{businessId}/appointments:
    parameters:
      - name: businessId
        in: path
        required: true
        description: İşletmenin benzersiz kimlik numarası
        schema:
          type: integer
        example: 3

    get:
      tags:
        - appointments
      summary: İşletmeye ait randevular
      description: Bir işletmenin tüm randevularını listeler
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Randevu listesi başarıyla getirildi
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: İşletme bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /services:
    post:
      tags:
        - services
      summary: Hizmet ekle
      description: İşletmeye yeni hizmet ekler
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Hizmet başarıyla oluşturuldu
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      tags:
        - services
      summary: Hizmet listele
      description: Hizmetleri listeler; isteğe bağlı işletme ID ile filtrelenebilir
      parameters:
        - name: businessId
          in: query
          required: false
          description: İşletmeye göre filtrele
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: Hizmet listesi başarıyla getirildi

  /services/{serviceId}:
    parameters:
      - name: serviceId
        in: path
        required: true
        description: Hizmetin benzersiz kimlik numarası
        schema:
          type: integer
        example: 10

    put:
      tags:
        - services
      summary: Hizmet güncelle
      description: Hizmet bilgilerini günceller
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Hizmet başarıyla güncellendi
        "401":
          description: Kimlik doğrulama başarısız (token eksik veya geçersiz)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu işlem için yetkiniz bulunmuyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Hizmet bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /categories/{categoryId}:
    parameters:
      - name: categoryId
        in: path
        required: true
        description: Kategorinin benzersiz kimlik numarası
        schema:
          type: integer
        example: 2

    get:
      tags:
        - categories
      summary: Kategoriye göre işletmeler
      description: Belirli bir kategorideki işletmeleri listeler
      responses:
        "200":
          description: İşletme listesi başarıyla getirildi
        "404":
          description: Kategori bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'JWT tabanlı kimlik doğrulama. İstek başlığına "Authorization: Bearer <token>" eklenmeli.'

  schemas:
    User:
      type: object
      description: Kullanıcı bilgilerini temsil eden model
      properties:
        id:
          type: integer
          description: Kullanıcının benzersiz kimlik numarası (otomatik atanır)
          example: 1
        name:
          type: string
          description: Kullanıcının adı soyadı
          example: "Ahmet Yılmaz"
        email:
          type: string
          description: Kullanıcının email adresi
          example: "kullanici@example.com"
        phone:
          type: string
          description: Kullanıcının telefon numarası
          example: "+905551234567"

    CustomerRegister:
      type: object
      description: Müşteri kayıt isteği için gönderilecek veri
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          description: Müşterinin adı soyadı
          minLength: 2
          maxLength: 50
          example: "Ahmet Yılmaz"
        email:
          type: string
          description: Müşterinin email adresi
          example: "kullanici@example.com"
        password:
          type: string
          description: Hesap şifresi
          minLength: 8
          example: "Guvenli123!"

    CustomerUpdate:
      type: object
      description: Müşteri güncelleme isteği için gönderilecek veri
      properties:
        name:
          type: string
          description: Müşterinin adı soyadı
          minLength: 2
          maxLength: 50
          example: "Ahmet Yılmaz"
        phone:
          type: string
          description: Telefon numarası
          example: "+905551234567"

    BusinessRegister:
      type: object
      description: İşletme kayıt isteği için gönderilecek veri
      required:
        - name
        - email
        - password
        - firstName
        - lastName
      properties:
        name:
          type: string
          description: İşletme adı
          minLength: 2
          maxLength: 100
          example: "ABC Kuaför"
        email:
          type: string
          description: İşletme email adresi
          example: "isletme@example.com"
        password:
          type: string
          description: Hesap şifresi
          minLength: 8
          example: "Guvenli123!"
        firstName:
          type: string
          description: Yetkili kişinin adı
          minLength: 2
          example: "Mehmet"
        lastName:
          type: string
          description: Yetkili kişinin soyadı
          minLength: 2
          example: "Demir"

    LoginCredentials:
      type: object
      description: Giriş isteği için gönderilecek kimlik bilgileri
      required:
        - email
        - password
      properties:
        email:
          type: string
          description: Kayıtlı email adresi
          example: "kullanici@example.com"
        password:
          type: string
          description: Hesap şifresi
          example: "Guvenli123!"

    AppointmentCreate:
      type: object
      description: Randevu oluşturma isteği için gönderilecek veri
      required:
        - serviceId
        - date
        - time
      properties:
        serviceId:
          type: integer
          description: Randevu alınan hizmetin kimlik numarası
          example: 10
        date:
          type: string
          format: date
          description: Randevu tarihi (YYYY-MM-DD)
          example: "2024-06-15"
        time:
          type: string
          format: time
          description: Randevu saati (HH:MM)
          example: "10:30"

    AppointmentsList:
      type: array
      description: Randevu listesi
      items:
        $ref: "#/components/schemas/Appointment"

    Appointment:
      type: object
      description: Randevu bilgilerini temsil eden model
      properties:
        id:
          type: integer
          description: Randevunun benzersiz kimlik numarası (otomatik atanır)
          example: 42
        serviceId:
          type: integer
          description: Hizmetin kimlik numarası
          example: 10
        date:
          type: string
          description: Randevu tarihi
          example: "2024-06-15"
        time:
          type: string
          description: Randevu saati
          example: "10:30"
        customerId:
          type: integer
          description: Müşterinin kimlik numarası
          example: 1

    AuthToken:
      type: object
      description: Kimlik doğrulama sonucunda dönen token bilgisi
      properties:
        token:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    Error:
      type: object
      description: Hata durumlarında döndürülen standart hata yanıtı
      required:
        - message
      properties:
        message:
          type: string
          description: Hatayı açıklayan mesaj
          example: "İstenen kaynak bulunamadı"
